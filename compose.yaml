services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "${DB_PUBLIC_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./bot.sql:/docker-entrypoint-initdb.d/01-bot.sql:ro
      - ./scripts/db-init/02-guild-privileges.sh:/docker-entrypoint-initdb.d/02-guild-privileges.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -u root -p$$MARIADB_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  adminer:
    image: adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_PUBLIC_PORT:-8081}:8080"

  bot:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_PUBLIC_PORT:-8000}:8000"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      RIOT_API_TOKEN: ${RIOT_API_TOKEN}
      RIOT_PLATFORM: ${RIOT_PLATFORM:-kr}
      RIOT_TOURNAMENT_REGION: ${RIOT_TOURNAMENT_REGION:-KR}
      RIOT_TOURNAMENT_CALLBACK_URL: ${RIOT_TOURNAMENT_CALLBACK_URL}
      RIOT_TOURNAMENT_USE_STUB: ${RIOT_TOURNAMENT_USE_STUB:-true}
      RIOT_TOURNAMENT_POLL_INTERVAL_MS: ${RIOT_TOURNAMENT_POLL_INTERVAL_MS:-10000}
      RIOT_TOURNAMENT_CALLBACK_PATH: ${RIOT_TOURNAMENT_CALLBACK_PATH:-/riot/callback}
      WEB_PORT: ${WEB_PORT:-8000}
      WEB_PUBLIC_GUILD_ID: ${WEB_PUBLIC_GUILD_ID}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_TIMEZONE: ${DB_TIMEZONE:-Z}
      BOT_DEPLOY_COMMIT: "${BOT_DEPLOY_COMMIT:-}"
      BOT_DEPLOY_MESSAGE: "${BOT_DEPLOY_MESSAGE:-}"
      BOT_DEPLOYED_AT: "${BOT_DEPLOYED_AT:-}"

  cloudflared:
    profiles: ["cloudflare"]
    image: ${CLOUDFLARED_IMAGE}
    restart: unless-stopped
    depends_on:
      bot:
        condition: service_started
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}

volumes:
  db_data:
